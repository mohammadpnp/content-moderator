services:
  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${GRPC_PORT:-9090}:9090"
      - "${PPROF_PORT:-6060}:6060"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-moderator}
      - DB_PASSWORD=${DB_PASSWORD:-moderator123}
      - DB_NAME=${DB_NAME:-content_moderator}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_HOST=nats
      - NATS_PORT=4222
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - HTTP_PORT=${HTTP_PORT:-8080}
      - GRPC_PORT=${GRPC_PORT:-9090}
      - PPROF_PORT=${PPROF_PORT:-6060}
      - MIGRATIONS_DIR=/app/deploy/migrations
    networks:
      - moderator-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-moderator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moderator123}
      POSTGRES_DB: ${DB_NAME:-content_moderator}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moderator} -d ${DB_NAME:-content_moderator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moderator-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - moderator-network
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: "-js -m 8222 --server_name moderator-nats"
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - moderator-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: moderator-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9091:9090"
    networks:
      - moderator-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: moderator-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - moderator-network
    restart: unless-stopped
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: moderator-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - moderator-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
    name: moderator-postgres-data
  redis-data:
    driver: local
    name: moderator-redis-data
  nats-data:
    driver: local
    name: moderator-nats-data
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  moderator-network:
    driver: bridge
    name: moderator-network