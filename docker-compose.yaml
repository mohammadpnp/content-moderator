
services:
  # ============================================
  # Application Service
  # ============================================
  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${GRPC_PORT}:${GRPC_PORT}"
      - "${PPROF_PORT}:${PPROF_PORT}"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_HOST=nats
      - NATS_PORT=4222
      - LOG_LEVEL=${LOG_LEVEL}
      - HTTP_PORT=${HTTP_PORT}
      - GRPC_PORT=${GRPC_PORT}
      - PPROF_PORT=${PPROF_PORT}
      - MIGRATIONS_DIR=/app/deploy/migrations
    networks:
      - moderator-network
    restart: unless-stopped

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moderator-network
    restart: unless-stopped

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: moderator-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - moderator-network
    restart: unless-stopped

  # ============================================
  # NATS Message Broker
  # ============================================
  nats:
    image: nats:2.10-alpine
    container_name: moderator-nats
    command: "-js -m 8222 --server_name moderator-nats"
    ports:
      - "${NATS_PORT}:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - moderator-network
    restart: unless-stopped

  # ============================================
  # Triton Inference Server (optional for Phase 0)
  # Will be used in Phase 2
  # ============================================
  # triton:
  #   image: nvcr.io/nvidia/tritonserver:24.01-py3
  #   container_name: moderator-triton
  #   ports:
  #     - "8000:8000"   # HTTP
  #     - "8001:8001"   # gRPC
  #     - "8002:8002"   # Metrics
  #   volumes:
  #     - ./models:/models:ro
  #   command: tritonserver --model-repository=/models
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - moderator-network

  prometheus:
    image: prom/prometheus:latest
    container_name: moderator-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - moderator-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: moderator-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - moderator-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: moderator-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - moderator-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
    name: moderator-postgres-data
  redis-data:
    driver: local
    name: moderator-redis-data
  nats-data:
    driver: local
    name: moderator-nats-data
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  moderator-network:
    driver: bridge
    name: moderator-network